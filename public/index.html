<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LSCSD — Система заявок</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:radial-gradient(circle at 20%30%,#0a0f0a,#050805);font-family:'Segoe UI','Roboto Condensed',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .preloader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0f0a;z-index:10000;display:flex;justify-content:center;align-items:center;transition:opacity .8s}
    .preloader.fade-out{opacity:0;pointer-events:none}
    .preloader-star{width:80px;height:80px;background:linear-gradient(135deg,#e6b422,#c9a03d);clip-path:polygon(50%0%,61%35%,98%35%,68%57%,79%91%,50%70%,21%91%,32%57%,2%35%,39%35%);margin:0 auto 20px;animation:spinPulse 1.5s infinite}
    @keyframes spinPulse{0%,100%{transform:scale(1);box-shadow:0 0 20px#c9a03d}50%{transform:scale(1.1);box-shadow:0 0 50px#e6b422}}
    .preloader-text{font-size:2.5rem;font-weight:900;letter-spacing:8px;text-align:center;color:#e6b422;margin-bottom:15px}
    .preloader-spinner{width:40px;height:40px;border:3px solid rgba(201,160,61,.3);border-top-color:#c9a03d;border-radius:50%;margin:20px auto;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .container{max-width:1400px;width:100%;background:rgba(25,30,18,.85);backdrop-filter:blur(10px);border-radius:40px;border:1px solid #c9a03d;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,.5)}
    .header{background:#1a2418;padding:20px 40px;border-bottom:3px solid #c9a03d;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
    .logo-area{display:flex;align-items:center;gap:20px}
    .badge-star{width:60px;height:60px;background:#e6b422;clip-path:polygon(50%0%,61%35%,98%35%,68%57%,79%91%,50%70%,21%91%,32%57%,2%35%,39%35%);box-shadow:0 0 0 3px#2a3b2a,0 0 0 5px#c9a03d}
    .logo-area h1{color:#ecd67a;font-size:1.8rem}
    .logo-area h1 span{font-size:.7rem;color:#bc9a3c;display:block}
    .user-info{display:flex;align-items:center;gap:15px;background:#2a3825;padding:8px 20px;border-radius:50px;border:1px solid #c9a03d}
    .user-avatar{width:40px;height:40px;border-radius:50%;border:2px solid #c9a03d}
    .logout-btn{background:#5a2a2a;border:none;color:#ffbc6e;padding:6px 16px;border-radius:30px;cursor:pointer}
    .auth-screen{display:flex;justify-content:center;align-items:center;min-height:70vh;padding:40px}
    .auth-card{background:#2c3826;padding:50px;border-radius:50px;text-align:center;max-width:500px;border:2px solid #c9a03d}
    .auth-card h2{color:#ecd67a;margin-bottom:20px}
    .auth-card p{color:#ddd;margin-bottom:30px}
    .discord-btn{background:#5865F2;color:#fff;padding:14px 35px;border-radius:50px;text-decoration:none;font-weight:bold;display:inline-block;transition:.2s}
    .discord-btn:hover{background:#4752c4;transform:scale(1.02)}
    .dashboard-header{padding:30px 40px 20px}
    .dashboard-header h2{color:#ecd67a;font-size:1.8rem}
    .dashboard-header p{color:#bc9a3c;margin-top:8px}
    .forms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:25px;padding:20px 40px 50px}
    .form-card{background:linear-gradient(145deg,#2e3d28,#1e2a1e);border-radius:30px;padding:30px 20px;text-align:center;border:1px solid rgba(201,160,61,.3);cursor:pointer;transition:.3s}
    .form-card:hover{transform:translateY(-8px);border-color:#c9a03d;box-shadow:0 15px 35px rgba(0,0,0,.4)}
    .form-card-icon{font-size:3rem;margin-bottom:15px}
    .form-card h3{color:#ecd67a;margin-bottom:8px}
    .form-card p{color:#a0a880;font-size:.85rem}
    .modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.95);backdrop-filter:blur(12px);overflow-y:auto}
    .modal-content{background:linear-gradient(145deg,#2c3826,#1e2a1e);margin:40px auto;padding:30px;border-radius:40px;max-width:600px;border:2px solid #c9a03d;position:relative}
    .close{position:absolute;right:25px;top:20px;font-size:35px;cursor:pointer;color:#c9a03d}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;margin-bottom:8px;color:#ecd67a;font-weight:bold}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;background:#1a2418;border:1px solid #c9a03d;border-radius:30px;color:#fff}
    .role-buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
    .role-btn{background:#2e3d28;border:1px solid #c9a03d;color:#f7e6b0;padding:8px 18px;border-radius:40px;cursor:pointer}
    .role-btn.selected{background:#c9a03d;color:#1e2a1e}
    .notice{background:#3a2a1a;border-left:5px solid #c9a03d;padding:10px;margin:15px 0;border-radius:15px;font-size:.85rem;color:#ffd966}
    .error-message{color:#ff9999;background:#5a2a2a;padding:10px;border-radius:30px;margin-bottom:15px;text-align:center}
    button[type=submit]{background:linear-gradient(135deg,#c9a03d,#e6b422);border:none;color:#1e2a1e;padding:12px;border-radius:50px;font-weight:bold;width:100%;cursor:pointer;font-size:1rem}
    button[type=submit]:hover{transform:scale(1.01)}
  </style>
</head>
<body>

<div class="preloader" id="preloader">
  <div>
    <div class="preloader-star"></div>
    <div class="preloader-text">LSCSD</div>
    <div class="preloader-spinner"></div>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="badge-star"></div>
      <h1>LSCSD<br><span>Sheriff Department</span></h1>
    </div>
    <div class="user-info" id="userInfo" style="display:none">
      <img id="userAvatar" class="user-avatar" src="">
      <span id="userName"></span>
      <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
  </div>

  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h2>Добро пожаловать</h2>
      <p>Авторизуйтесь через Discord для подачи заявок</p>
      <a href="#" class="discord-btn" id="discordLoginBtn">🔗 Войти через Discord</a>
    </div>
  </div>

  <div id="appScreen" style="display:none">
    <div class="dashboard-header">
      <h2>📋 Система заявок LSCSD</h2>
      <p>Выберите тип обращения</p>
    </div>
    <div class="forms-grid" id="formsGrid"></div>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
(function(){
  // ОБФУСЦИРОВАННЫЕ ДАННЫЕ (вебхуки спрятаны)
  const _0x3a4b=['YXBwbHktZGVwYXJ0bWVudA==','YXBwZWFsLXJlcHJpbWFuZA==','d29ya29mZi1yZXByaW1hbmQ=','cHJvbW90aW9u','bGVhdmU='];
  const _0x2c8d=['aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ5NDY3ODAyNjkzODQ4Njc5Ny9NOS1XRXBQbXEtOTlseHZxZy0zZkh1d056Zy1kVFlRQ1lsQk9iX2hxd3QwSV95OHJxMC12dXRCWS0wdDZwLWRJYmNZWg=='];
  
  function decode(str){return atob(str);}
  
  const WEBHOOKS = {
    main: decode(_0x2c8d[0])
  };
  
  const DEPARTMENTS = ['SAI','GU','AF','IAD','SEB','K-9','DID','MED','SPD'];
  const FORMS = [
    {id:'department',label:'Заявка в отдел',icon:'📋',desc:'Подача заявления на перевод'},
    {id:'appeal',label:'Обжалование выговора',icon:'⚖',desc:'Обжалование взыскания'},
    {id:'workoff',label:'Отработка выговора',icon:'🛠',desc:'Снятие выговора'},
    {id:'promotion',label:'Повышение',icon:'⭐',desc:'Заявка на повышение'},
    {id:'leave',label:'Отпуск',icon:'🏖',desc:'Плановый отпуск'},
    {id:'rest',label:'Отдых',icon:'🌴',desc:'Краткосрочный отдых'},
    {id:'spec-request',label:'Спецвооружение',icon:'🔫',desc:'Заявка на выдачу'},
    {id:'spec-receive',label:'Получение спецвооружения',icon:'📦',desc:'Отчёт о получении'},
    {id:'resignation',label:'Увольнение',icon:'📄',desc:'Рапорт на увольнение'}
  ];
  
  let currentUser=null;
  
  function renderForms(){
    const grid=document.getElementById('formsGrid');
    if(!grid)return;
    grid.innerHTML='';
    FORMS.forEach(f=>{
      const card=document.createElement('div');
      card.className='form-card';
      card.innerHTML=`<div class="form-card-icon">${f.icon}</div><h3>${f.label}</h3><p>${f.desc}</p>`;
      card.onclick=()=>openForm(f.id);
      grid.appendChild(card);
    });
  }
  
  function openForm(type){
    const modal=document.getElementById('modal');
    const body=document.getElementById('modalBody');
    body.innerHTML=`<h3 style="color:#ecd67a;margin-bottom:20px">Форма заявки</h3><p>Загрузка...</p>`;
    modal.style.display='block';
    loadForm(type,body);
  }
  
  function loadForm(type,container){
    if(type==='department'){
      container.innerHTML=`
        <h3 style="color:#ecd67a;margin-bottom:20px">📋 Заявка в отдел</h3>
        <form id="formEl"><div class="form-group"><label>Имя *</label><input id="fn" required></div>
        <div class="form-group"><label>Фамилия *</label><input id="ln" required></div>
        <div class="form-group"><label>Статик *</label><input id="st" required></div>
        <div class="form-group"><label>Ранг *</label><input id="rk" required></div>
        <div class="form-group"><label>Отдел *</label><div id="deptBtns" class="role-buttons"></div><input type="hidden" id="dept"></div>
        <div class="form-group"><label>Причина *</label><textarea id="rsn" rows="3" required></textarea></div>
        <div class="error-message" id="err" style="display:none"></div>
        <button type="submit">Отправить</button></form>`;
      const btns=container.querySelector('#deptBtns');
      DEPARTMENTS.forEach(d=>{const b=document.createElement('div');b.className='role-btn';b.textContent=d;b.onclick=()=>{btns.querySelectorAll('.role-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');document.getElementById('dept').value=d;};btns.appendChild(b);});
      container.querySelector('#formEl').onsubmit=async(e)=>{
        e.preventDefault();
        const data={firstName:document.getElementById('fn').value,lastName:document.getElementById('ln').value,staticc:document.getElementById('st').value,rank:document.getElementById('rk').value,department:document.getElementById('dept').value,reason:document.getElementById('rsn').value};
        if(!data.firstName||!data.lastName||!data.staticc||!data.rank||!data.department||!data.reason){showErr(container,'Заполните все поля');return;}
        await sendForm('/api/apply-department',data,container);
      };
    }else if(type==='workoff'){
      container.innerHTML=`
        <h3 style="color:#ecd67a;margin-bottom:20px">🛠 Отработка выговора</h3>
        <form id="formEl"><div class="form-group"><label>Имя *</label><input id="fn" required></div>
        <div class="form-group"><label>Фамилия *</label><input id="ln" required></div>
        <div class="form-group"><label>Статик *</label><input id="st" required></div>
        <div class="form-group"><label>Ранг *</label><select id="rk"><option value="">Выберите</option><option value="1-4">1-4 ранг</option><option value="5-8">5-8 ранг</option><option value="9-11">9-11 ранг</option><option value="13">13 ранг</option></select></div>
        <div class="form-group"><label>За что выговор *</label><textarea id="rsn" rows="2" required></textarea></div>
        <div class="form-group"><label>Тип наказания *</label><select id="pt"><option value="">Выберите</option><option value="Устный выговор">Устный выговор</option><option value="Строгий выговор">Строгий выговор</option></select></div>
        <div class="notice" id="notice">💰 Выберите ранг и тип</div>
        <div class="form-group"><label>Док-ва *</label><textarea id="ev" rows="2" required></textarea></div>
        <div class="error-message" id="err" style="display:none"></div>
        <button type="submit">Отправить</button></form>`;
      const rk=container.querySelector('#rk'),pt=container.querySelector('#pt'),notice=container.querySelector('#notice');
      const update=()=>{const r=rk.value,t=pt.value;const m={'1-4':{'Устный выговор':'15.000$ / 200 бинтов','Строгий выговор':'25.000$'},'5-8':{'Устный выговор':'20.000$ / 350 бинтов','Строгий выговор':'30.000$'},'9-11':{'Устный выговор':'25.000$ / 450 бинтов','Строгий выговор':'42.000$'},'13':{'Устный выговор':'35.000$ / 600 бинтов','Строгий выговор':'45.000$'}};notice.textContent=m[r]?.[t]?`💸 Для снятия: ${m[r][t]}`:'💰 Выберите ранг и тип';};
      rk.onchange=update;pt.onchange=update;
      container.querySelector('#formEl').onsubmit=async(e)=>{
        e.preventDefault();
        const data={firstName:document.getElementById('fn').value,lastName:document.getElementById('ln').value,staticc:document.getElementById('st').value,rank:document.getElementById('rk').value,reason:document.getElementById('rsn').value,punishmentType:document.getElementById('pt').value,evidence:document.getElementById('ev').value};
        if(!data.firstName||!data.lastName||!data.staticc||!data.rank||!data.reason||!data.punishmentType||!data.evidence){showErr(container,'Заполните все поля');return;}
        await sendForm('/api/workoff-reprimand',data,container);
      };
    }else{
      container.innerHTML=`<p>Форма в разработке</p><button onclick="document.getElementById('modal').style.display='none'">Закрыть</button>`;
    }
  }
  
  function showErr(container,msg){
    const err=container.querySelector('#err');
    if(err){err.textContent=msg;err.style.display='block';setTimeout(()=>err.style.display='none',4000);}
    else alert(msg);
  }
  
  async function sendForm(url,data,container){
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      const result=await res.json();
      if(result.success){alert('✅ Заявка отправлена!');document.getElementById('modal').style.display='none';}
      else showErr(container,result.error||'Ошибка');
    }catch(err){showErr(container,'Ошибка сети');}
  }
  
  document.querySelector('.close')?.addEventListener('click',()=>document.getElementById('modal').style.display='none');
  window.addEventListener('click',(e)=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').style.display='none';});
  document.getElementById('logoutBtn')?.addEventListener('click',()=>{localStorage.removeItem('lscsd_user');location.reload();});
  
  function checkAuth(){
    const user=localStorage.getItem('lscsd_user');
    if(user){
      currentUser=JSON.parse(user);
      document.getElementById('authScreen').style.display='none';
      document.getElementById('appScreen').style.display='block';
      document.getElementById('userInfo').style.display='flex';
      document.getElementById('userName').innerText=currentUser.username;
      if(currentUser.avatar)document.getElementById('userAvatar').src=currentUser.avatar;
      renderForms();
    }else{
      document.getElementById('authScreen').style.display='flex';
      document.getElementById('appScreen').style.display='none';
      document.getElementById('userInfo').style.display='none';
    }
  }
  
  document.getElementById('discordLoginBtn')?.addEventListener('click',()=>{
    const clientId='1494686473520287774';
    const redirectUri=encodeURIComponent(window.location.origin+'/auth/callback.html');
    window.location.href=`https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=token&scope=identify+guilds`;
  });
  
  if(window.location.hash.includes('access_token')){
    const hash=window.location.hash.substring(1);
    const params=new URLSearchParams(hash);
    const token=params.get('access_token');
    if(token){
      fetch('https://discord.com/api/users/@me',{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json())
        .then(user=>{
          fetch(`https://discord.com/api/users/@me/guilds`,{headers:{Authorization:`Bearer ${token}`}})
            .then(r=>r.json())
            .then(guilds=>{
              const inGuild=guilds.some(g=>g.id==='1274112490606821516');
              if(inGuild){
                localStorage.setItem('lscsd_user',JSON.stringify({id:user.id,username:user.username,avatar:user.avatar?`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`:''}));
                window.location.href='/';
              }else alert('Вы не состоите на сервере LSCSD!');
            });
        }).catch(()=>alert('Ошибка авторизации'));
    }
  }
  
  window.addEventListener('load',()=>{
    setTimeout(()=>{document.getElementById('preloader')?.classList.add('fade-out');setTimeout(()=>document.getElementById('preloader')?.remove(),800);},1200);
    checkAuth();
  });
  
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='C'||e.key==='J'))||(e.ctrlKey&&e.key==='U')){e.preventDefault();}});
})();
</script>
</body>
</html>
